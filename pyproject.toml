[project]
name = "nodus"
version = "0.8.0"
description = "A stack-VM scripting language and distributed workflow runtime"
authors = [
  {name = "Shawn Knight"}
]

requires-python = ">=3.10"

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::DeprecationWarning:websockets",
    "ignore::DeprecationWarning:uvicorn",
    "ignore::PendingDeprecationWarning:starlette",
]
