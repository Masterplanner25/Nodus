[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nodus-a2a-spec"
version = "0.1.0"
description = "Incubator spec — Python-first agent-to-agent coordination framework for Nodus"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "platform-team" }]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=9.0"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
