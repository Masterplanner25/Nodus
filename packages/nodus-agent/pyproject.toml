[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nodus-agent"
version = "0.1.0"
description = "Python-first agent orchestration framework for Nodus runtimes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "platform-team" }]
dependencies = []

[project.optional-dependencies]
test = [
  "pytest>=9.0",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
# Ensure the scaffold's own src/ package is imported, not the same-named
# published production package if it happens to be installed in the venv.
pythonpath = ["src"]
testpaths = ["tests"]
