[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nodus-http"
version = "0.1.0"
description = "Python-first outbound HTTP primitives for Nodus runtimes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "platform-team" }]
dependencies = [
  "httpx>=0.28,<1.0",
  "typing_extensions>=4.0; python_version < '3.12'",
]

[project.optional-dependencies]
otel = ["opentelemetry-api>=1.0"]
test = [
  "pytest>=9.0",
  "pytest-asyncio>=1.0",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
