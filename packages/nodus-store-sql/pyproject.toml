[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nodus-store-sql"
version = "0.1.0"
description = "Python-first SQLAlchemy persistence adapters for Nodus runtimes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "platform-team" }]
dependencies = ["SQLAlchemy>=2.0"]

[project.optional-dependencies]
test = ["pytest>=9.0"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
