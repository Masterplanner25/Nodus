[build-system]
requires = ["setuptools>=80", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nodus-events"
version = "0.1.0"
description = "Python-first event distribution primitives for Nodus runtimes"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "platform-team" }]
dependencies = []

[project.optional-dependencies]
redis = ["redis>=5.0"]
sql = ["SQLAlchemy>=2.0"]
test = ["pytest>=9.0"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
