name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Check .nd formatting
        run: |
          find . -name "*.nd" \
            -not -path "./.git/*" \
            -not -path "./.venv/*" \
            -not -path "./tmp_demo/*" \
            -not -path "./tests/fixtures/fmt/*" \
            | xargs -I {} python nodus.py fmt --check {}

      - name: Static checks
        run: |
          python nodus.py check examples/import_demo.nd
          python nodus.py check examples/stdlib_demo.nd

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Pytest
        run: python -m pytest -q

      - name: Install build tooling
        run: python -m pip install build wheel

      - name: Installed wheel smoke test
        env:
          NODUS_RUN_DIST_SMOKE: "1"
        run: python -m unittest tests.test_distribution_smoke -v

      - name: Example suite
        run: python nodus.py test-examples
