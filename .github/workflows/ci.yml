name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # actions/checkout v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # actions/setup-python v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Type check (mypy — non-blocking baseline)
        continue-on-error: true
        run: mypy src/nodus/ --ignore-missing-imports --no-error-summary

      - name: Check .nd formatting
        run: |
          find . -name "*.nd" \
            -not -path "./.git/*" \
            -not -path "./.venv/*" \
            -not -path "./tmp_demo/*" \
            -not -path "./tests/fixtures/fmt/*" \
            | xargs -I {} python nodus.py fmt --check {}

      - name: Static checks
        run: |
          python nodus.py check examples/import_demo.nd
          python nodus.py check examples/stdlib_demo.nd

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Pytest
        run: python -m pytest -q

      - name: Coverage
        run: |
          python -m pytest -q \
            --cov=src/nodus \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --deselect=tests/test_scheduler_fairness.py::test_multiple_tasks_progress \
            --deselect=tests/test_scheduler_fairness.py::test_long_running_task_rotates_with_budget \
            --deselect="tests/test_task_graph.py::TaskGraphTests::test_worker_death_detection"

      - name: Install build tooling
        run: python -m pip install build wheel

      - name: Build wheel
        run: python -m build --wheel

      - name: Installed wheel smoke test
        env:
          NODUS_RUN_DIST_SMOKE: "1"
        run: python -m unittest tests.test_distribution_smoke -v

      - name: Example suite
        run: python nodus.py test-examples
