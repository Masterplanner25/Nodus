name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto-format examples
        run: |
          find examples/ -name "*.nd" | sort | while read -r f; do
            python nodus.py fmt "$f"
          done

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet examples/ || (
            git add examples/*.nd &&
            git commit -m "style: auto-format examples/ [skip ci]"
          )

      - name: Formatter check
        run: |
          python - <<'PY'
          import os, subprocess, sys
          files = []
          for root, _, names in os.walk('.'):
            if root.startswith('./.git'):
              continue
            for name in names:
              if name.endswith(('.nd', '.tl')):
                files.append(os.path.join(root, name))
          files.sort()
          if not files:
            sys.exit(0)
          for path in files:
            result = subprocess.run([sys.executable, 'nodus.py', 'fmt', path, '--check'])
            if result.returncode != 0:
              sys.exit(result.returncode)
          PY

      - name: Static checks
        run: |
          python nodus.py check examples/import_demo.nd
          python nodus.py check examples/stdlib_demo.nd

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Example suite
        run: python nodus.py test-examples
