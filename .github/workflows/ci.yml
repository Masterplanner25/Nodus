name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Auto-format all .nd files
        run: |
          find . -name "*.nd" \
            -not -path "./.git/*" \
            -not -path "./.venv/*" \
            -not -path "./tmp_demo/*" \
            -not -path "./tests/fixtures/fmt/*" \
            | xargs -I {} python nodus.py fmt {}

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (
            git add $(find . -name "*.nd" -not -path "./.git/*" -not -path "./.venv/*") &&
            git commit -m "style: auto-format .nd files [skip ci]"
          )

      - name: Check .nd formatting
        run: |
          find . -name "*.nd" \
            -not -path "./.git/*" \
            -not -path "./.venv/*" \
            -not -path "./tmp_demo/*" \
            -not -path "./tests/fixtures/fmt/*" \
            | xargs -I {} python nodus.py fmt --check {}

      - name: Static checks
        run: |
          python nodus.py check examples/import_demo.nd
          python nodus.py check examples/stdlib_demo.nd

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Example suite
        run: python nodus.py test-examples
